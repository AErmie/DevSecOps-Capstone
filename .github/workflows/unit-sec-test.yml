name: Unit and Security Scanning
on:
  workflow_call:

jobs:
  # Run unit test cases for the Docker image after security gates pass.
  unit_test:
    name: Run unit test
    runs-on: ubuntu-latest
    needs: ["sast_semgrep", "trivy_scans", "owasp_zap_scan"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  # SAST gate using Semgrep. ERROR-level findings fail the build.
  sast_semgrep:
    name: Run Semgrep SAST scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep==1.74.0

      - name: Run Semgrep (block on ERROR findings)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/python \
            --severity ERROR \
            --error \
            --sarif \
            --output semgrep-results.sarif \
            .

      - name: Upload Semgrep results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

  # SCA gate using Trivy for third-party libraries. HIGH/CRITICAL findings fail the build.
  trivy_scans:
    name: Run Trivy security scanner against the image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t python-fastapi:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "python-fastapi:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          vuln-type: "library"
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  owasp_zap_scan:
    runs-on: ubuntu-latest
    name: app scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build and tag image
      # Run Docker image in detached mode
      - name: Build Docker Image
        run: |
          docker build -t python-fastapi:${{ github.sha }} .
          docker run -d -p 8080:8080 python-fastapi:${{ github.sha }}

      - name: Wait for Docker container to be ready
        run: sleep 30

      - name: Confirm Docker container is running
        run: docker ps

      # Run OWASP ZAP scan
      - name: zap scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          format: openapi
          target: "http://0.0.0.0:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          allow_issue_writing: false
