name: Security Feedback Report

on:
  workflow_call:
    inputs:
      report_name:
        description: Human-readable report title.
        required: false
        type: string
        default: Security Feedback Report
      artifact_name:
        description: Artifact name for the generated markdown report.
        required: false
        type: string
        default: security-feedback-report
      expected_baseline_checks:
        description: Comma-separated check names that are expected to fail in current baseline.
        required: false
        type: string
        default: Run Trivy security scanner against the image,Run OWASP ZAP DAST scan
      post_pr_comment:
        description: Whether to publish/update a PR comment with the report.
        required: false
        type: boolean
        default: false
      pr_number:
        description: Pull request number for PR comment posting.
        required: false
        type: string
        default: ""
      source_sha:
        description: Primary commit SHA to report against (typically PR head SHA).
        required: false
        type: string
        default: ""
      fallback_sha:
        description: Secondary commit SHA to include when checks are attached to a different ref (for example PR merge SHA).
        required: false
        type: string
        default: ""
      head_repo_full_name:
        description: Full name of the PR head repository for fork-safe comment posting.
        required: false
        type: string
        default: ""
      include_gitguardian:
        description: Whether to include GitGuardian check in report and readiness gating.
        required: false
        type: boolean
        default: false
      wait_for_codeql:
        description: Wait for CodeQL check runs to complete before finalizing the report.
        required: false
        type: boolean
        default: true
      codeql_wait_timeout_minutes:
        description: Maximum time in minutes to wait for CodeQL check runs.
        required: false
        type: number
        default: 8
      codeql_poll_interval_seconds:
        description: Poll interval in seconds while waiting for CodeQL check runs.
        required: false
        type: number
        default: 10

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  security-feedback-report:
    name: Generate Security Feedback Report
    runs-on: ubuntu-latest
    outputs:
      report_body: ${{ steps.build_report.outputs.report_body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build consolidated security report
        id: build_report
        uses: actions/github-script@v7
        env:
          REPORT_NAME: ${{ inputs.report_name }}
          EXPECTED_BASELINE_CHECKS: ${{ inputs.expected_baseline_checks }}
          INCLUDE_GITGUARDIAN: ${{ inputs.include_gitguardian }}
          WAIT_FOR_CODEQL: ${{ inputs.wait_for_codeql }}
          CODEQL_WAIT_TIMEOUT_MINUTES: ${{ inputs.codeql_wait_timeout_minutes }}
          CODEQL_POLL_INTERVAL_SECONDS: ${{ inputs.codeql_poll_interval_seconds }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          FALLBACK_SHA: ${{ inputs.fallback_sha }}
        with:
          script: |
            const fs = require("fs");

            const expectedPatterns = process.env.EXPECTED_BASELINE_CHECKS
              .split(",")
              .map((item) => item.trim())
              .filter(Boolean);

            const scannerTargets = [
              { label: "Secret Scan (GitLeaks)", matchers: ["Scan for leaked secrets", "secret-scan"] },
              { label: "Semgrep SAST", matchers: ["Run Semgrep SAST scan", "Semgrep OSS"] },
              { label: "Trivy SCA", matchers: ["Run Trivy security scanner", "Trivy"] },
              { label: "OWASP ZAP DAST", matchers: ["Run OWASP ZAP DAST scan", "OWASP ZAP"] },
              { label: "CodeQL", matchers: ["CodeQL Analysis", "CodeQL"] },
            ];

            const includeGitGuardian = String(process.env.INCLUDE_GITGUARDIAN || "false").toLowerCase() === "true";
            if (includeGitGuardian) {
              scannerTargets.push({ label: "GitGuardian", matchers: ["GitGuardian Security Checks"] });
            }

            const { owner, repo } = context.repo;
            const requestedSourceSha = (process.env.SOURCE_SHA || "").trim();
            const requestedFallbackSha = (process.env.FALLBACK_SHA || "").trim();
            const reportRef = requestedSourceSha || context.sha;
            const candidateRefs = [...new Set([
              requestedSourceSha,
              requestedFallbackSha,
              context.sha,
            ].filter(Boolean))];
            const waitForCodeQL = String(process.env.WAIT_FOR_CODEQL || "true").toLowerCase() === "true";
            const waitTimeoutMinutes = Number(process.env.CODEQL_WAIT_TIMEOUT_MINUTES || 8);
            const pollIntervalSeconds = Number(process.env.CODEQL_POLL_INTERVAL_SECONDS || 10);

            const fetchCheckRunsForRef = async (ref) => {
              return github.paginate(
                github.rest.checks.listForRef,
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                },
                (response) => response.data.check_runs,
              );
            };

            const fetchWorkflowJobsAsCheckRuns = async () => {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner,
                  repo,
                  run_id: context.runId,
                  per_page: 100,
                },
                (response) => response.data.jobs,
              );

              return (jobs || [])
                .filter((job) => job && typeof job.id !== "undefined")
                .map((job) => ({
                id: job.id,
                name: job.name,
                status: job.status,
                conclusion: job.conclusion,
                html_url: job.html_url,
                }));
            };

            const fetchCheckRuns = async () => {
              const allRuns = [];
              for (const ref of candidateRefs) {
                const refRuns = await fetchCheckRunsForRef(ref);
                allRuns.push(...refRuns);
              }

              // Dedupe runs across refs by check-run id.
              const deduped = [];
              const seenIds = new Set();
              for (const run of allRuns) {
                if (!run || seenIds.has(run.id)) {
                  continue;
                }

                seenIds.add(run.id);
                deduped.push(run);
              }

              // Fallback to workflow jobs when check-run lookup is empty.
              if (deduped.length === 0) {
                core.info("No check runs found for candidate refs; falling back to current workflow jobs.");
                return fetchWorkflowJobsAsCheckRuns();
              }

              return deduped;
            };

            const getMatchingRuns = (allRuns, target) => {
              const safeRuns = allRuns.filter(
                (candidate) => candidate && typeof candidate.name === "string",
              );

              return safeRuns.filter((candidate) =>
                target.matchers.some((matcher) => candidate.name.includes(matcher)),
              );
            };

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let checkRuns = await fetchCheckRuns();

            const iconFor = (conclusion, expected) => {
              if (conclusion === "success") {
                return "PASS";
              }

              if (conclusion === "failure") {
                return expected ? "WARN" : "FAIL";
              }

               if (conclusion === "skipped") {
                return "SKIP";
              }

              if (conclusion === "neutral") {
                return "NEUTRAL";
              }

              if (conclusion === "not_found") {
                return "INFO";
              }

              if (conclusion === "queued" || conclusion === "in_progress") {
                return "RUN";
              }

              return "INFO";
            };

            const aggregateConclusion = (runs) => {
              if (runs.length === 0) {
                return "not_found";
              }

              if (runs.some((run) => run.status !== "completed")) {
                return runs.some((run) => run.status === "in_progress")
                  ? "in_progress"
                  : "queued";
              }

              const conclusions = runs.map((run) => run.conclusion || "unknown");
              const failureConclusions = [
                "failure",
                "cancelled",
                "timed_out",
                "action_required",
                "stale",
              ];

              if (conclusions.some((conclusion) => failureConclusions.includes(conclusion))) {
                return "failure";
              }

              if (conclusions.some((conclusion) => conclusion === "skipped")) {
                return "skipped";
              }

              if (conclusions.some((conclusion) => conclusion === "neutral")) {
                return "neutral";
              }

              if (conclusions.every((conclusion) => conclusion === "success")) {
                return "success";
              }

              return "unknown";
            };

            let codeqlWaitTimedOut = false;

            if (waitForCodeQL) {
              const codeqlTarget = scannerTargets.find((target) => target.label === "CodeQL");
              const timeoutAt = Date.now() + waitTimeoutMinutes * 60 * 1000;

              while (Date.now() < timeoutAt) {
                const codeqlRuns = getMatchingRuns(checkRuns, codeqlTarget);
                const codeqlConclusion = aggregateConclusion(codeqlRuns);
                const hasStarted = codeqlRuns.length > 0;
                const isDone = hasStarted && !["queued", "in_progress"].includes(codeqlConclusion);

                if (isDone) {
                  core.info(`CodeQL checks completed with conclusion: ${codeqlConclusion}.`);
                  break;
                }

                core.info(
                  hasStarted
                    ? `Waiting for CodeQL checks to complete (current: ${codeqlConclusion})...`
                    : "Waiting for CodeQL checks to appear for this commit...",
                );

                await sleep(pollIntervalSeconds * 1000);
                checkRuns = await fetchCheckRuns();
              }

              const finalCodeqlRuns = getMatchingRuns(checkRuns, codeqlTarget);
              const finalCodeqlConclusion = aggregateConclusion(finalCodeqlRuns);
              if (finalCodeqlRuns.length === 0 || ["queued", "in_progress"].includes(finalCodeqlConclusion)) {
                codeqlWaitTimedOut = true;
              }
            }

            const safeCheckRuns = checkRuns.filter(
              (candidate) => candidate && typeof candidate.name === "string",
            );

            const rows = scannerTargets.map((target) => {
              const matchingRuns = safeCheckRuns.filter((candidate) =>
                target.matchers.some((matcher) => candidate.name.includes(matcher)),
              );

              const runNames = matchingRuns.map((run) => run.name);
              const conclusion = aggregateConclusion(matchingRuns);
              const expected = runNames.some((runName) =>
                expectedPatterns.some((pattern) => runName.includes(pattern)),
              );

              let notes = "Security gate signal collected.";
              if (matchingRuns.length === 0) {
                notes = "Check run not found for this commit. Review workflow configuration.";
              } else if (conclusion === "failure" && expected) {
                notes = "Expected baseline failure for intentionally vulnerable training target.";
              } else if (conclusion === "failure") {
                notes = "Unexpected failure. Investigate and remediate before release.";
              } else if (conclusion === "skipped") {
                notes = "Check was skipped (often due to upstream dependency failure or job conditions).";
              } else if (conclusion === "neutral") {
                notes = "Check completed with a neutral conclusion (no pass/fail gate signal).";
              } else if (conclusion === "queued" || conclusion === "in_progress") {
                notes = "Check still running when report was generated.";
              }

              const runLinks = matchingRuns.map((run) => {
                if (run.html_url) {
                  return `[${run.name}](${run.html_url})`;
                }

                return run.name;
              });

              return {
                scanner: target.label,
                runName: runLinks.length > 0 ? runLinks.join("<br>") : "(missing)",
                status: iconFor(conclusion, expected),
                conclusion,
                notes,
              };
            });

            const timestamp = new Date().toISOString();
            const reportTitle = process.env.REPORT_NAME;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const branchName = process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME;
            const gatingRows = rows.filter((row) => waitForCodeQL || row.scanner !== "CodeQL");
            const unexpectedFailures = gatingRows.filter(
              (row) => row.conclusion === "failure" && !row.notes.includes("Expected baseline failure"),
            );
            const expectedFailures = gatingRows.filter(
              (row) => row.conclusion === "failure" && row.notes.includes("Expected baseline failure"),
            );
            const missingChecks = gatingRows.filter((row) => row.conclusion === "not_found");
            const stillRunning = gatingRows.filter(
              (row) => row.conclusion === "queued" || row.conclusion === "in_progress",
            );
            const skippedChecks = gatingRows.filter((row) => row.conclusion === "skipped");
            const neutralChecks = gatingRows.filter((row) => row.conclusion === "neutral");
            const releaseReady =
              unexpectedFailures.length === 0 &&
              stillRunning.length === 0 &&
              missingChecks.length === 0 &&
              skippedChecks.length === 0 &&
              (!waitForCodeQL || !codeqlWaitTimedOut);

            const lines = [];
            lines.push(`# ${reportTitle}`);
            lines.push("");
            lines.push(`- Repository: ${owner}/${repo}`);
            lines.push(`- Branch: ${branchName}`);
            lines.push(`- Commit: ${reportRef}`);
            lines.push(`- Workflow run: ${runUrl}`);
            lines.push(`- Generated at (UTC): ${timestamp}`);
            lines.push(`- Release readiness: ${releaseReady ? "READY" : "BLOCKED"}`);
            lines.push(
              `- CodeQL wait policy: ${waitForCodeQL ? `enabled (timeout reached: ${codeqlWaitTimedOut ? "yes" : "no"})` : "disabled"}`,
            );
            if (!waitForCodeQL) {
              lines.push("- Readiness note: CodeQL is excluded from readiness gating because wait_for_codeql=false.");
            }
            lines.push(
              `- Report totals: ${rows.length} checks, ${unexpectedFailures.length} unexpected failures, ${expectedFailures.length} expected baseline failures, ${stillRunning.length} still running, ${missingChecks.length} missing, ${skippedChecks.length} skipped, ${neutralChecks.length} neutral`,
            );
            lines.push("");
            lines.push("## Scanner Status Overview");
            lines.push("");
            lines.push("| Scanner | Status | Conclusion | Check Run | Notes |");
            lines.push("|---|---|---|---|---|");

            for (const row of rows) {
              lines.push(
                `| ${row.scanner} | ${row.status} | ${row.conclusion} | ${row.runName} | ${row.notes} |`,
              );
            }

            lines.push("");
            lines.push("## Baseline Interpretation");
            lines.push("");
            lines.push("- WARN rows marked as expected baseline failures are currently accepted for this capstone stage.");
            lines.push("- FAIL rows indicate unexpected blocking issues requiring remediation.");
            lines.push("- PASS rows indicate the corresponding scanner/check succeeded.");
            lines.push("- INFO rows indicate missing check runs and should be treated as a workflow configuration signal.");
            lines.push("- RUN rows indicate checks still in progress at report generation time.");
            lines.push("- SKIP rows indicate checks skipped due to workflow conditions/dependencies and should be reviewed before release.");
            lines.push("- NEUTRAL rows indicate checks completed without a strict pass/fail result.");

            const reportBody = `${lines.join("\n")}\n`;
            const reportPath = "security-feedback-report.md";

            fs.writeFileSync(reportPath, reportBody, "utf-8");

            core.setOutput("report_path", reportPath);
            core.setOutput("report_body", reportBody);

      - name: Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ steps.build_report.outputs.report_path }}
          if-no-files-found: error

      - name: Publish GitHub Step Summary
        run: cat "${{ steps.build_report.outputs.report_path }}" >> "$GITHUB_STEP_SUMMARY"

  security-feedback-pr-comment:
    name: Broadcast Security Feedback PR Comment
    runs-on: ubuntu-latest
    if: ${{ inputs.post_pr_comment && inputs.pr_number != '' && (inputs.head_repo_full_name == '' || inputs.head_repo_full_name == github.repository) }}
    needs:
      - security-feedback-report
    permissions:
      pull-requests: write
      issues: write

    steps:

      - name: Broadcast report as PR comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPORT_BODY: ${{ needs.security-feedback-report.outputs.report_body }}
        with:
          script: |
            const marker = "<!-- phase4-security-feedback-report -->";
            const issueNumber = Number(process.env.PR_NUMBER);
            const body = `${marker}\n${process.env.REPORT_BODY}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              },
              (response) => response.data,
            );

            const existingComment = comments.find((comment) =>
              comment.user &&
              comment.user.login === "github-actions[bot]" &&
              comment.body &&
              comment.body.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              core.info(`Updated existing security feedback comment (${existingComment.id}).`);
            } else {
              const created = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
              core.info(`Created new security feedback comment (${created.data.id}).`);
            }
