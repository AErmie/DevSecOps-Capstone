name: Push Docker Image


on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  IMAGE_NAME: 'python-fastapi'


jobs:
  Push_Image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Change String Case
        id: string
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository_owner }}

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      # Extract metadata (tags, labels) for Docker
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}

      # Login against a Docker registry
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # Build and tag Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag \
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:latest
          docker tag \
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:testing


      # Push the Docker image to the registry
      - name: Push Docker Image to GHCR
        run: |
          docker push ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ steps.string.outputs.lowercase }}/${{ env.IMAGE_NAME }}:testing
