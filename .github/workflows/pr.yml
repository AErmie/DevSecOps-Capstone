name: PR Workflow
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  checks: read

jobs:
    secret-scan:
        uses: ./.github/workflows/gitleaks.yml

    build-image:
        uses: ./.github/workflows/build-image.yml
        needs: secret-scan

    lint-format:
        uses: ./.github/workflows/lint-format.yml
        needs: build-image

    unit-sec-scan:
        uses: ./.github/workflows/unit-sec-test.yml
        needs: lint-format

    security-feedback-report:
        if: always()
        permissions:
          contents: read
          actions: read
          checks: read
          pull-requests: write
          issues: write
        needs:
          - secret-scan
          - build-image
          - lint-format
          - unit-sec-scan
        uses: ./.github/workflows/security-report.yml
        with:
          report_name: PR Security Feedback Report
          artifact_name: pr-security-feedback-report
          post_pr_comment: true
          pr_number: ${{ github.event.pull_request.number }}
